name: Daily Journal Form Submission

on:
  schedule:
    - cron: '30 3 * * 1-6'  # Mon-Sat at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch: {}       # Manual trigger from GitHub Actions tab

jobs:
  submit-form:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests playwright && playwright install chromium

      - name: Install system dependencies for Playwright
        run: playwright install-deps chromium

      - name: Start virtual display (Xvfb) for video recording
        run: |
          sudo apt-get install -y xvfb ffmpeg
          Xvfb :99 -screen 0 1280x900x24 &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          sleep 2
          echo "Virtual display started"

      - name: Start screen recording
        env:
          DISPLAY: ':99'
        run: |
          ffmpeg -y -video_size 1280x900 -framerate 25 -f x11grab -i :99 \
            -codec:v libx264 -preset ultrafast -pix_fmt yuv420p \
            form-recording.mp4 > ffmpeg.log 2>&1 &
          echo "FFMPEG_PID=$!" >> $GITHUB_ENV
          echo "Screen recording started"

      - name: Submit the form
        run: python submit_form.py

      - name: Take screenshot of confirmation page
        env:
          DISPLAY: ':99'
        run: python take_screenshot.py

      - name: Stop screen recording
        if: always()
        run: |
          kill ${{ env.FFMPEG_PID }} || true
          sleep 3
          echo "Recording stopped"

      - name: Upload screenshot as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-screenshot-${{ github.run_number }}
          path: form-confirmation-*.png
          if-no-files-found: ignore

      - name: Upload video recording as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-video-${{ github.run_number }}
          path: form-recording.mp4
          if-no-files-found: warn

      - name: Upload submission details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submission-details-${{ github.run_number }}
          path: submission_details.json
          if-no-files-found: ignore