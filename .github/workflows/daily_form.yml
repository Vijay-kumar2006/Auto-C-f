name: Daily Journal Form Submission

on:
  schedule:
    - cron: '30 3 * * 1-6'  # Mon-Sat at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  submit-form:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests playwright && playwright install chromium

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Install ffmpeg and xvfb
        run: sudo apt-get install -y xvfb ffmpeg

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Start screen recording
        run: |
          ffmpeg -y -f x11grab -video_size 1280x900 -framerate 25 -i :99.0 \
            -codec:v libx264 -preset ultrafast -pix_fmt yuv420p \
            form-recording.mp4 > ffmpeg.log 2>&1 &
          echo "FFMPEG_PID=$!" >> $GITHUB_ENV
          sleep 1

      - name: Submit the form
        run: python submit_form.py

      - name: Take proof screenshot
        run: python take_screenshot.py

      - name: Stop screen recording
        if: always()
        run: |
          kill ${{ env.FFMPEG_PID }} 2>/dev/null || true
          sleep 3

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-screenshot-${{ github.run_number }}
          path: form-confirmation-*.png
          if-no-files-found: ignore

      - name: Upload video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-video-${{ github.run_number }}
          path: form-recording.mp4
          if-no-files-found: warn

      - name: Upload submission details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submission-details-${{ github.run_number }}
          path: submission_details.json
          if-no-files-found: ignore
